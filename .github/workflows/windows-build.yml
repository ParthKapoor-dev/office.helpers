name: Windows build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write # required to publish a Release on tag pushes

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests (on Windows)
        run: pytest -q

      - name: Build EXE
        run: pyinstaller packaging/pdf_numbering.spec

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Page-Numberer
          path: dist/PDF-Page-Numberer.exe

      - name: Publish Release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PDF-Page-Numberer.exe
