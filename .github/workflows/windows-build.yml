name: Windows build

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: write # required to create the tag + Release

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # job-level grant for creating the tag + Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests (on Windows)
        run: pytest -q

      - name: Build EXE
        run: pyinstaller packaging/pdf_numbering.spec

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Page-Numberer
          path: dist/PDF-Page-Numberer.exe

      # --- Release ---------------------------------------------------------
      # On pushes to main, publish a GitHub Release for the version in the
      # VERSION file. The Release (and its git tag) are created by the action
      # using the Actions token, so no manual tag push is needed. Bump VERSION
      # to cut a new release; existing versions are skipped.
      - name: Read version
        if: github.ref == 'refs/heads/main'
        id: ver
        shell: bash
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Check whether this version was already released
        if: github.ref == 'refs/heads/main'
        id: tagcheck
        shell: bash
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.ver.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Release
        if: github.ref == 'refs/heads/main' && steps.tagcheck.outputs.exists == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.version }}" \
            "dist/PDF-Page-Numberer.exe" \
            --title "${{ steps.ver.outputs.version }}" \
            --notes "Automated Windows build of ${{ steps.ver.outputs.version }}." \
            --target "$GITHUB_SHA"
